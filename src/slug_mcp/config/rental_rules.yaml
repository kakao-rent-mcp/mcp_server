# 임대주택(건설임대: 영구·국민·행복·5/10년 공공) 입주자격 기준표 — rental_engine 전용.
#
# 출처: 마이홈포털 유형별 입주자격 페이지, 2026년도 적용기준 (2026-07-13 확인)
#   - 국민임대: m.myhome.go.kr/hws/portal/cont/selectNationalRentalHouseView.do
#   - 영구임대: m.myhome.go.kr/hws/portal/cont/selectPermanentRHView.do
#   - 행복주택: m.myhome.go.kr/hws/portal/cont/selectHappyHouseView.do
#   - 공공임대: www.myhome.go.kr/hws/portal/cont/selectPubRentalHouseView.do
#
# 주의 1: eligibility_rules.yaml의 분양 소득표는 1·2·3인을 "3인 이하" 통합 행(7,533,763원)으로
#         쓰지만, 임대는 1·2·3인 개별 행 + 1·2인 가구 가산(%p)을 쓴다 — 혼용 금지.
# 주의 2: 자산 상한은 건설임대 기준이다. 매입임대·전세임대(고시 2025-560호, 자동차 4,563만원)와
#         트랙이 다르므로 혼용 금지 (eligibility_rules.yaml의 기존 경고와 동일).
# 주의 3: 이 표는 일반 고시 기준이며 공고별로 다를 수 있다. 판정 결과에는 항상
#         "공고문 원문(search_lease_notices 결과의 detail_url) 대조" 안내를 붙인다.

# 도시근로자 가구원수별 월평균소득 100% — 임대용 개별 행 표 (단위: 원/월).
# 1·2인 기본값은 마이홈 공표 컬럼(가산 포함 금액)에서 역산했다. 검산: 공표값 = 기본값 ×
# (비율 + 가산%p)이 원 단위까지 일치 (예: 1인 50%컬럼 2,669,354 = 3,813,363 × 0.70,
# 2인 70%컬럼 4,693,016 = 5,866,270 × 0.80). 4인 이상은 분양표와 동일함을 확인.
# 8인 이상 가구는 고시 미확인 — 판정 시 공고문 확인을 안내한다.
rental_income_100pct_krw:
  "1": 3813363
  "2": 5866270
  "3": 8168429
  "4": 8802202
  "5": 9326985
  "6": 9906263
  "7": 10485541

# 1·2인 가구 소득비율 가산(%p). 예: 국민임대 70% 기준이 1인 가구엔 90%, 2인 가구엔 80%로 적용.
# 마이홈 국민임대 금액표·영구임대 장애인 기준(100% → 1인 120%/2인 110%)과 교차 확인.
household_income_bonus_pct:
  "1": 20
  "2": 10

# 세대 자산 상한 (단위: 만원). vehicle: 0 은 자동차 소유 불가를 뜻한다.
asset_limits_10k_won:
  national: { total_asset: 34500, vehicle: 4542 }
  # 영구임대 자산요건은 마이홈에 "자산요건 충족"으로만 표기 — 국민임대와 동일 적용하되 요검증.
  permanent: { total_asset: 34500, vehicle: 4542 }
  # 공공임대(5·10년)는 총자산이 아니라 부동산(토지·건축물) 상한을 쓴다.
  public: { real_estate: 21550, vehicle: 4542 }
  happy:
    college_student: { total_asset: 10800, vehicle: 0 } # 대학생 계층은 자동차 소유 불가
    youth: { total_asset: 25100, vehicle: 4542 }
    newlywed: { total_asset: 34500, vehicle: 4542 } # 한부모가족 포함
    # 고령자·주거급여수급자 자산 상한은 마이홈 페이지에 미표기 — 신혼부부와 동일(세대 기준
    # 최대치)로 두되 요검증.
    elderly: { total_asset: 34500, vehicle: 4542 }
    welfare_recipient: { total_asset: 34500, vehicle: 4542 }

# ── 영구임대: 수급자 중심 순위제 (청약통장 불필요) ─────────────────────────────
permanent:
  requires_account: false
  # 1순위 자격 중 프로필로 판정 가능한 것만 코드화한다. 북한이탈주민·일본군위안부 피해자·
  # 아동복지시설 퇴소자 등은 프로필 필드가 없어 제외 — 해당자는 공고문 대조를 안내한다.
  rank1:
    basic_living_recipient: true # 생계·의료급여 수급자 (welfare.is_basic_living_recipient)
    national_merit_income_pct: 70 # 국가유공자는 소득 70% 이하 + 자산요건 충족 시 1순위
    single_parent: true # 지원대상 한부모가족 (is_single_parent)
    near_poverty_65plus: true # 만 65세 이상 + 수급권자·차상위 (age + is_near_poverty)
  rank2:
    income_pct: 50 # 소득 50% 이하 + 자산요건. 마이홈 표기 "(1인 90%, 2인 80%)"는 공통
    # 가산(+20/+10%p → 70%/60%)과 어긋난다 — 원문 오독 가능성이 있어 공통 가산을 쓰되 요검증.

# ── 국민임대: 소득컷 + 면적별 순위 + 동일순위 배점 ───────────────────────────
national:
  requires_account: true # 50㎡ 이상만. 50㎡ 미만은 통장 무관(거주지 순위)
  income_pct: 70 # 기본 소득 상한 (50㎡ 미만 우선공급은 50% 이하 우선)
  income_pct_priority_under_50sqm: 50
  # 순위: 전용 50㎡ 미만은 거주지 기준, 50㎡ 이상은 통장 기준.
  rank_under_50sqm:
    rank1: 당해 시·군·자치구 거주자
    rank2: 연접 시·군·자치구 거주자
    rank3: 기타 지역 거주자
  rank_50sqm_or_more:
    rank1: { account_months: 24, payment_count: 24 }
    rank2: { account_months: 6, payment_count: 6 }
    rank3: 기타 신청자
  # 동일순위 경쟁 시 배점표. 프로필 매핑: age → 나이, dependents_count → 부양가족,
  # residence_years_in_region → 거주기간, children_count → 미성년자녀,
  # payment_count → 납입횟수. 고령부양(65세 이상 1년 이상, 3점)은 프로필 필드가 없어
  # 0점 처리하고 action_items로 안내한다.
  tiebreak_score_table:
    age: { 50: 3, 40: 2, 30: 1 } # 만 나이 하한 → 점수
    dependents: { 3: 3, 2: 2, 1: 1 } # 부양가족 수 하한 → 점수
    residence_years: { 5: 3, 3: 2, 1: 1 } # 해당 지역 연속 거주 연수 하한 → 점수
    minor_children: { 3: 3, 2: 2 } # 미성년 자녀 수 하한 → 점수
    elderly_care: { 1: 3 } # 65세 이상 직계존속 1년 이상 부양 (프로필 미수집 — 0점 처리)
    payment_count: { 60: 3, 48: 2, 36: 1 } # 청약 납입횟수 하한 → 점수

# ── 행복주택: 계층제 (나이·혼인·수급 정보로 계층 추론) ────────────────────────
happy:
  requires_account: false # 신청 자체엔 불필요(입주 시 가입 필요 계층 있음 — 안내만)
  # 계층별 소득 상한(%). 전 계층 공통으로 1·2인 가구 가산이 붙는다.
  # 프로필로 판정 불가한 계층(대학생·취업준비생·사회초년생·산업단지근로자)은 제외 —
  # 해당 가능성이 있으면 verification_notes로 안내한다.
  tiers:
    youth: { age_min: 19, age_max: 39, income_pct: 100 } # 미혼 무주택자
    newlywed: { marriage_years_max: 7, income_pct: 100, income_pct_dual: 120 }
    # 신혼부부는 혼인 7년 이내 '또는' 6세 이하 자녀 — 판정 시 OR 조건으로 처리.
    single_parent: { child_age_max: 6, income_pct: 100 } # 6세 이하 자녀를 둔 한부모
    elderly: { age_min: 65, income_pct: 100 }
    welfare_recipient: { income_pct: null } # 주거급여 수급자는 소득기준 없음(수급 자체로 충족)
  # 최대 거주기간(자격판정 아님 — 판정 결과에 참고로 첨부).
  max_residency_years:
    youth: 10
    newlywed_no_child: 10
    newlywed_with_child: 14
    elderly: 20
    welfare_recipient: 20

# ── 공공임대(5·10년 분양전환): 통장 순위제 + 소득·자산 ───────────────────────
public:
  requires_account: true
  max_size_sqm: 85 # 50년 임대는 50㎡ 이하 — 5·10년만 지원(50년은 신규 공급 사실상 없음)
  # 60㎡ 이하만 소득기준 적용(100%), 60㎡ 초과는 소득기준 없음.
  income_pct_upto_60sqm: 100
  income_pct_over_60sqm: null
  # 우선공급(1순위) 통장 요건 — 수도권/비수도권이 다르다.
  rank1_account:
    capital: { account_months: 12, payment_count: 12 } # 서울·경기·인천
    non_capital: { account_months: 6, payment_count: 6 }
  # 잔여공급은 통장 가입만 하면 신청 가능.
