# 청약 자격판정·가점계산 기준값 (룰 엔진 SOT 미러)
#
# 작성일: 2026-07-05 (웹 재검증 완료분 반영)
# 중요: 아래 수치는 자동으로 갱신되지 않습니다. 법령/고시 개정 시 사람이 직접 고쳐야 합니다.
#       각 섹션의 출처 주석과 docs/subscription-policy-spec.md 의 검증 태그를 함께 갱신하세요.
#
# 출처:
#   - 자산기준: 국가법령정보센터 "공공주택 입주자 보유 부동산 및 자동차 관련 업무처리기준"
#     + 2026-02-27 입주자모집공고분 실측값
#   - 소득기준표: 분양 입주자모집공고문 실측(2026-04-10 청주 푸르지오 등) — "3인 이하" 통합 행
#     7,533,763원, 9인↑ 가산 579,278원. 2026-07-06 확정(분양 표. 임대주택 개별 행 표와 혼용 금지)
#   - 규제지역: 국토교통부 10.15 대책(2025-10-15, 서울 전역+경기 12곳)
#     + 2026-07-01 추가지정(화성 동탄구·용인 기흥구·구리) = 현행 서울 전역 + 경기 15곳 (2026-07-06 확인)
#   - 민영주택 예치금표, 공공주택 순위요건: 청약홈 청약제도안내 (applyhome.co.kr)
#   - 신혼부부 특공 배점표: LH청약플러스 청약자격확인(분양주택) 2026-07-05 직접 확인
#     (우선공급 경쟁 시 9점 만점, 일반공급 경쟁 시 12점 만점 — 기획서의 13점표를 교체)

# 자산 상한 (공공분양 전용 60㎡ 이하 신청 시 적용, 2026-02-27 공고분 기준, 단위: 만원)
# 주의: 매입임대·전세임대 자산기준(고시 2025-560호, 자동차 4,563만원)과 트랙이 다름 — 혼용 금지.
asset_limits:
  real_estate_10k_won: 21550
  vehicle_10k_won: 4542
  total_asset_10k_won: 34500

# 공급유형별 진입 소득 상한 (도시근로자 월평균소득 대비 %, single=외벌이 / dual=맞벌이).
# 추첨 물량 기준 최대치이며, 이 상한을 넘으면 해당 트랙 자체가 부적격이다(우선/잔여 물량별
# 세부 소득구간은 트랙 분기에서 별도 처리). 외벌이 실효 상한은 전 트랙 140%.
# 2026-07-06 LH청약플러스(cntntsId=1051)·마이홈 확인.
income_ratio_by_supply_type:
  public_generic: { single: 100, dual: 200 } # 공공 일반공급 60㎡ 이하(60㎡ 초과는 소득기준 없음)
  newlywed: { single: 130, dual: 200 } # 신혼 특공 진입 최대(추첨 물량)
  multi_child: { single: 120, dual: 200 } # 다자녀 특공(민영 다자녀는 소득요건 없음)
  first_time: { single: 130, dual: 200 } # 생애최초 특공
  old_parents: { single: 120, dual: 200 } # 노부모부양 특공(미구현, 참고)

# 도시근로자 가구원수별 월평균소득 100% — 분양(공공분양·특별공급) 소득기준표 (단위: 원/월)
# 2026-07-06 실제 입주자모집공고문(2026-04-10 청주 푸르지오 등)으로 확정. 매년 갱신.
# 분양 소득표는 1·2·3인을 "3인 이하" 통합 행 하나로 적용한다(임대주택 개별 행 표와 다름 — 혼용 금지).
# 9인 이상: 8인 금액 + 초과 1인당 579,278원.
urban_worker_monthly_income_krw:
  "3": 7533763 # 3인 이하 (1·2·3인 공통)
  "4": 8802202
  "5": 9326985
  "6": 9906263
  "7": 10485541
  "8": 11064819
extra_person_income_krw: 579278

# 규제지역(조정대상지역·투기과열지구) 동적 목록 — 2026-07-01 추가지정 반영(2026-07-06 확인).
# "강남3구·용산" 하드코딩 금지(스펙 Filter-03). 고시 개정 시 이 목록만 갱신한다.
# 매칭 방식(engine.is_regulated_region): 공백으로 나눈 각 토큰이 지역 문자열에 '시/군/구'
# 등 행정단위로 등장해야 매칭된다(예: "성남 분당" → "성남시 분당구"). 도로명 부분일치는 배제.
regulated_regions:
  full_sido: ["서울"] # 시·도 전체가 규제인 곳
  gyeonggi_districts: # 경기 15곳(성남은 3개구 전역이라 시 단위로 합침)
    - "과천"
    - "광명"
    - "성남" # 분당·수정·중원 3개구 전역 규제 → 시 단위로 매칭(주소가 구를 생략해도 잡힘)
    - "수원 영통"
    - "수원 장안"
    - "수원 팔달"
    - "안양 동안"
    - "용인 수지"
    - "의왕"
    - "하남"
    - "화성 동탄" # 2026-07-01 지정. 화성시 동탄구(2026-02 신설, 동탄1~9동)
    - "용인 기흥" # 2026-07-01 지정(용인시 기흥구)
    - "구리" # 2026-07-01 지정(구리시 전역)

# 지역 등급 — 민영주택 예치금표에 쓰이는 지역 구분
region_tier:
  tier1: ["서울", "부산"]
  tier2: ["인천", "대구", "광주", "대전", "울산"]
  # 세종은 특별시·광역시가 아니므로 tier3(기타지역, 85㎡↓ 200만원) — 별표 2 확인(2026-07-06).
  # 위에 없는 지역은 전부 tier3(기타 시·군)으로 취급한다.

subscription_account:
  private:
    # 민영주택 1순위 청약통장 가입기간 요건(개월) — 규칙 제28조①1호(2026-07-06 확인).
    # 민영은 예치금 기준이라 납입횟수 요건은 없다(시·도지사 연장 조항은 미모델).
    rank1_min_months:
      overheated_region: 24
      capital_region: 12
      non_capital_region: 6
    # 민영주택: 전용면적 구간별 예치금 기준표 (단위: 만원)
    deposit_table_10k_won:
      "85": { tier1: 300, tier2: 250, tier3: 200 }
      "102": { tier1: 600, tier2: 400, tier3: 300 }
      "135": { tier1: 1000, tier2: 700, tier3: 400 }
      "all": { tier1: 1500, tier2: 1000, tier3: 500 }
  public:
    # 공공주택: 1순위 최소 가입기간(개월)·최소 납입횟수
    rank1_requirement:
      capital_region: { min_months: 12, min_payments: 12 }
      non_capital_region: { min_months: 6, min_payments: 6 }
      overheated_region: { min_months: 24, min_payments: 24 }
    # 순차제 계산 시 인정되는 월 납입액 상한 (2024-11 개정, 단위: 원)
    max_recognized_monthly_payment_krw: 250000

# 신생아 특별공급(공공) 물량 배분 + 소득기준 (LH청약플러스 확인 — 스펙 §2.B.①)
# 우선·일반(90%)은 배점 다득점순, 순수 추첨은 10%뿐이다.
newborn_supply:
  priority: { share: 70, income_ratio: 100, income_ratio_dual: 120 }
  general: { share: 20, income_ratio: 140, income_ratio_dual: 150 }
  lottery: { share: 10, income_ratio_dual_max: 200 } # 140% 초과(자산요건 충족), 맞벌이 200% 이하

# 신혼부부 특별공급(공공 일반형) 배점표 — 「공공주택 특별법 시행규칙」 별표 6 순위제 +
# 경쟁 시 13점 만점. 2026-07-06 LH청약플러스 분양가이드(cntntsId=1051) 직접 확인.
# 순위제: 1순위=혼인기간 중 자녀 있는 신혼부부/혼인외출생자/한부모, 2순위=그 외.
# 13점 = 가구소득1 + 미성년자녀수3 + 해당시도거주기간3 + 납입횟수3 + 혼인기간(한부모는 자녀나이)3.
# 주의: 나눔형·토지임대부(별표 6의6)는 5항목 각 3점(우선 9점/일반 12점)의 별도 체계다.
newlywed_score_table:
  income: { single_max: 80, dual_max: 100, points: 1 } # 소득 80%↓(맞벌이 100%↓) 1점, 초과 0
  children_count: { "3": 3, "2": 2, "1": 1 } # 3명↑3 / 2명2 / 1명1 / 0명0
  residence_years: { "3": 3, "1": 2, "0": 1 } # 3년↑3 / 1~3년2 / 1년미만·미거주1
  payment_count: { "24": 3, "12": 2, "6": 1 } # 24회↑3 / 12~24회2 / 6~12회1 / 6회미만0
  marriage_years: { high_max: 3, mid_max: 5, low_max: 7 } # 혼인 3년↓3 / 3~5년2 / 5~7년1

# 신생아 특별공급(공공) 우선·일반공급 경쟁 배점표 — 10점 만점(해당지역→배점순→추첨).
# 2026-07-06 LH청약플러스(cntntsId=1051)·마이홈 확인. 항목·총점 확신 상, 세부 구간 중상.
newborn_score_table:
  income: { single_max: 80, dual_max: 100, points: 1 } # 소득 80%↓(맞벌이 100%↓) 1점, 초과 0
  children_count: { "3": 3, "2": 2, "1": 1 } # 3명↑3 / 2명2 / 1명1
  residence_years: { "3": 3, "1": 2, "0": 1 } # 3년↑3 / 1~3년2 / 1년미만1
  payment_count: { "24": 3, "12": 2, "6": 1 } # 24회↑3 / 12~24회2 / 6~12회1

# 다자녀 특별공급(공공) 배점표 — 100점 만점 (스펙 §2.B.③, 🟢 검증)
# 가입기간은 최대 5점(10점 아님), 세대구성 5점이 별도 존재한다.
multi_child_score_table:
  children: { "4": 40, "3": 35, "2": 25 }
  infants: { "3": 15, "2": 10, "1": 5 }
  household_composition_bonus: 5 # 3세대 이상 동거 또는 한부모
  homeless_years: { "10": 20, "5": 15, "1": 10 }
  residence_years: { "10": 15, "5": 10, "1": 5 }
  # 통장 가입기간은 "10년 이상 5점" 단일 구간 — 고시 제2024-163호 별표 1(2026-07-06 공고문 확인).
  account_years: { "10": 5 }

# 목표지역 등급별 예상 컷오프 (2026 예상 — 참고용 DB, 법정 기준 아님. 스펙 §6.A)
# 실시간 값은 recommend_housing이 과거 당첨가점 API로 보정한다.
expected_cutoffs:
  S: { private_score_min: 69, private_score_max: 74, public_balance_min_krw: 22000000 }
  A: { private_score_min: 59, private_score_max: 68, public_balance_min_krw: 17000000 }
  B: { private_score_min: 40, private_score_max: 58, public_balance_min_krw: 12000000 }
  C: { private_score_min: 0, private_score_max: 39, public_balance_min_krw: 0 }

# 지역 문자열 → 등급 매핑 (위에서부터 첫 매치 우선. 어디에도 없으면 C)
region_grade_keywords:
  S: ["강남", "서초", "송파", "용산", "마포", "성동"]
  A: ["서울", "하남", "과천", "분당"]
  B: ["경기", "인천", "부산", "대구", "광주", "대전", "울산", "세종"]

# 강제 매칭(is_forced_matching) 시 대안 지역 제안 (스펙 §6.B Case 4)
alternative_regions:
  - region: "경기 3기 신도시 (하남 교산/고양 창릉/남양주 왕숙 등)"
    reason: "서울 대비 당첨 저축총액·가점 컷이 낮고 사전·본청약 물량이 이어진다."
  - region: "GTX 노선 인근 외곽 (파주 운정/양주/평택 등)"
    reason: "교통 호재 대비 경쟁률이 낮아 낮은 가점으로도 실현 가능성이 있다."
