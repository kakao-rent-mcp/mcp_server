name: CI

# PR 게이트 전용. main 머지 시의 test/build-push는 build.yml이 담당한다.
on:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Lint (ruff check)
        run: uv run ruff check .

      - name: Format check (ruff format)
        run: uv run ruff format --check .

      - name: Type check (mypy)
        run: uv run mypy src

      - name: Test (pytest, fixture 목킹만 사용 — 실제 정부 API 키 불필요)
        run: uv run pytest -v
