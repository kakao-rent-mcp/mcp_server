name: Build & Push

# main에 머지(push)되면: 테스트 → Docker 이미지 빌드 → GHCR push.
# 런타임 배포(컨테이너 기동)는 KC 클라우드 쪽 방식이 정해지면 별도로 붙인다.
# GHCR에 올라간 이미지를 배포 대상이 pull해 가는 구조를 전제로 한다.
on:
  push:
    branches: [main]

# 동시에 여러 빌드가 겹치지 않게 직렬화한다.
concurrency:
  group: build-main
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv sync
      - name: Lint (ruff check)
        run: uv run ruff check .
      - name: Format check (ruff format)
        run: uv run ruff format --check .
      - name: Type check (mypy)
        run: uv run mypy src
      - name: Test (pytest, fixture 목킹만 — 실제 API 키 불필요)
        run: uv run pytest -v

  build-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          # main 최신본은 :latest, 추적용으로 커밋 sha 태그도 함께 붙인다.
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # 서비스키를 빌드 시점에만 주입한다. 소스에는 남지 않고 이미지에만 구워진다.
          # 키가 박힌 이미지이므로 이 GHCR 패키지는 반드시 private으로 유지해야 한다.
          build-args: |
            DECODING_KEY=${{ secrets.DECODING_KEY }}
            ENCODING_KEY=${{ secrets.ENCODING_KEY }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
